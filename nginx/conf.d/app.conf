# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name api.24ondoc.ru chat.24ondoc.ru pgadmin.24ondoc.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Backend API (api.24ondoc.ru)
server {
    listen 443 ssl http2;
    server_name api.24ondoc.ru;

    ssl_certificate /etc/letsencrypt/live/api.24ondoc.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.24ondoc.ru/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 20M;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Telegram webhook long-poll fallback)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# pgAdmin 4 (pgadmin.24ondoc.ru)
server {
    listen 443 ssl http2;
    server_name pgadmin.24ondoc.ru;

    ssl_certificate /etc/letsencrypt/live/pgadmin.24ondoc.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pgadmin.24ondoc.ru/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 10M;

    location / {
        proxy_pass http://pgadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Script-Name "";
        proxy_redirect off;
    }
}

# Chatwoot CRM (chat.24ondoc.ru)
server {
    listen 443 ssl http2;
    server_name chat.24ondoc.ru;

    ssl_certificate /etc/letsencrypt/live/chat.24ondoc.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.24ondoc.ru/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 50M;

    location / {
        proxy_pass http://chatwoot:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (ActionCable)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
