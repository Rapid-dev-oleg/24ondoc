# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name 24ondoc.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main server (24ondoc.ru)
server {
    listen 443 ssl http2;
    server_name 24ondoc.ru;

    ssl_certificate /etc/letsencrypt/live/24ondoc.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/24ondoc.ru/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    client_max_body_size 50M;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Telegram webhook -> backend (must be before root / location)
    location /webhook/telegram {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/webhook/telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # T2 ATS webhook -> backend
    location /webhook/t2/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/webhook/t2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API + Admin at /backend/ -> backend:8000/
    location /backend/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # pgAdmin 4 at /pgadmin/
    location /pgadmin/ {
        set $pgadmin_upstream http://pgadmin:80;
        proxy_pass $pgadmin_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_redirect off;
    }

    location = /pgadmin {
        return 301 /pgadmin/;
    }

    # Twenty CRM at root /
    location / {
        set $twenty_upstream http://twenty:3000;
        proxy_pass $twenty_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
