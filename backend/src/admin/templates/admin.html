<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24ondoc — Админ-панель</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .toast-enter { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900" x-data="adminApp()" x-cloak>

  <!-- Toast notifications -->
  <div class="fixed top-4 right-4 z-50 space-y-2" style="max-width:360px">
    <template x-for="(t, i) in toasts" :key="t.id">
      <div class="toast-enter flex items-start gap-3 p-4 rounded-lg shadow-lg text-sm"
           :class="t.type === 'error' ? 'bg-red-50 border border-red-200 text-red-800' : 'bg-green-50 border border-green-200 text-green-800'">
        <span x-text="t.type === 'error' ? '✗' : '✓'" class="font-bold mt-0.5"></span>
        <p x-text="t.msg" class="flex-1"></p>
        <button @click="toasts.splice(i,1)" class="opacity-60 hover:opacity-100">✕</button>
      </div>
    </template>
  </div>

  <!-- ─── LOGIN VIEW ─── -->
  <template x-if="!token">
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-800 dark:to-gray-900 p-4">
      <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
          <h1 class="text-2xl font-bold text-center text-gray-900 dark:text-white mb-2">24ondoc</h1>
          <p class="text-center text-gray-500 dark:text-gray-400 text-sm mb-8">Панель управления</p>

          <!-- Password login form -->
          <form @submit.prevent="login()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Telegram ID</label>
              <input type="number" x-model="loginForm.telegram_id" required
                     class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                     placeholder="123456789">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Пароль администратора</label>
              <input type="password" x-model="loginForm.password" required
                     class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                     placeholder="••••••••">
            </div>
            <button type="submit" :disabled="isLoading"
                    class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-medium rounded-lg transition-colors">
              <span x-show="!isLoading">Войти</span>
              <span x-show="isLoading">Вход...</span>
            </button>
          </form>

          <!-- Telegram Widget (loaded when bot username is available) -->
          <template x-if="botUsername">
            <div class="mt-6">
              <div class="relative flex items-center">
                <div class="flex-grow border-t border-gray-200 dark:border-gray-600"></div>
                <span class="flex-shrink mx-3 text-sm text-gray-400">или</span>
                <div class="flex-grow border-t border-gray-200 dark:border-gray-600"></div>
              </div>
              <div class="mt-4 flex justify-center" id="tg-widget-container"></div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </template>

  <!-- ─── ADMIN VIEW ─── -->
  <template x-if="token">
    <div class="min-h-screen">
      <!-- Navbar -->
      <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
          <h1 class="text-lg font-bold text-gray-900 dark:text-white">24ondoc Админ</h1>
          <div class="flex items-center gap-3">
            <button @click="toggleTheme()" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-gray-400">
              <span x-text="isDark ? '☀️' : '🌙'"></span>
            </button>
            <button @click="logout()" class="text-sm text-red-600 hover:text-red-700 dark:text-red-400 font-medium">Выйти</button>
          </div>
        </div>
      </nav>

      <!-- Tab navigation -->
      <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4">
          <div class="flex gap-1">
            <template x-for="tab in ['users', 'settings']" :key="tab">
              <button @click="switchTab(tab)"
                      :class="activeTab === tab ? 'border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400' : 'text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white'"
                      class="px-4 py-3 text-sm font-medium transition-colors capitalize">
                <span x-text="tabLabel(tab)"></span>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="max-w-7xl mx-auto px-4 py-6">

        <!-- ── Users tab ── -->
        <div x-show="activeTab === 'users'" x-transition>
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Пользователи</h2>
            <button @click="showAddUserModal = true"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
              + Добавить оператора
            </button>
          </div>

          <template x-if="isLoadingUsers">
            <div class="text-center py-12 text-gray-500 dark:text-gray-400">Загрузка...</div>
          </template>

          <template x-if="!isLoadingUsers">
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 dark:bg-gray-700">
                  <tr>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Telegram ID</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Chatwoot User ID</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Chatwoot Account ID</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Chatwoot Contact ID</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Роль</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Телефон</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Voice URL</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Settings</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Статус</th>
                    <th class="px-3 py-3 text-left font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Создан</th>
                    <th class="px-3 py-3 text-right font-medium text-gray-600 dark:text-gray-300 whitespace-nowrap">Действия</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                  <template x-if="users.length === 0">
                    <tr><td colspan="11" class="px-4 py-8 text-center text-gray-400">Нет пользователей</td></tr>
                  </template>
                  <template x-for="u in users" :key="(u.telegram_id || '') + u.chatwoot_user_id">
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                      <td class="px-3 py-3 text-gray-900 dark:text-white font-mono whitespace-nowrap" x-text="u.telegram_id || '—'"></td>
                      <td class="px-3 py-3 text-gray-600 dark:text-gray-300 font-mono whitespace-nowrap" x-text="u.chatwoot_user_id"></td>
                      <td class="px-3 py-3 text-gray-600 dark:text-gray-300 font-mono whitespace-nowrap" x-text="u.chatwoot_account_id"></td>
                      <td class="px-3 py-3 text-gray-600 dark:text-gray-300 font-mono whitespace-nowrap" x-text="u.chatwoot_contact_id ?? '—'"></td>
                      <td class="px-3 py-3 whitespace-nowrap">
                        <span class="text-xs font-medium" x-text="u.role"></span>
                      </td>
                      <td class="px-3 py-3 text-gray-600 dark:text-gray-300 font-mono whitespace-nowrap" x-text="u.phone_internal || '—'"></td>
                      <td class="px-3 py-3 text-gray-600 dark:text-gray-300 max-w-xs truncate">
                        <span x-text="u.voice_sample_url || '—'" :title="u.voice_sample_url || ''"></span>
                      </td>
                      <td class="px-3 py-3 text-gray-600 dark:text-gray-300 font-mono text-xs max-w-xs truncate">
                        <span x-text="Object.keys(u.settings || {}).length ? JSON.stringify(u.settings) : '—'" :title="JSON.stringify(u.settings)"></span>
                      </td>
                      <td class="px-3 py-3 whitespace-nowrap">
                        <template x-if="u.is_active">
                          <span class="text-xs bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 px-2 py-1 rounded-full">Активен</span>
                        </template>
                        <template x-if="!u.is_active">
                          <span class="text-xs bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 px-2 py-1 rounded-full">Неактивен</span>
                        </template>
                      </td>
                      <td class="px-3 py-3 text-gray-500 dark:text-gray-400 text-xs whitespace-nowrap" x-text="u.created_at ? new Date(u.created_at).toLocaleDateString('ru-RU') : '—'"></td>
                      <td class="px-3 py-3 text-right whitespace-nowrap">
                        <button @click="openEditModal(u)"
                                class="text-xs text-blue-600 hover:text-blue-700 dark:text-blue-400 font-medium mr-2">
                          Изменить
                        </button>
                        <button @click="deleteUser(u.telegram_id)"
                                class="text-xs text-red-600 hover:text-red-700 dark:text-red-400 font-medium">
                          Удалить
                        </button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>

        <!-- ── Settings tab ── -->
        <div x-show="activeTab === 'settings'" x-transition>
          <div class="mb-4">
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Настройки</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Значения частично скрыты. Оставьте поле пустым, чтобы не изменять.</p>
          </div>

          <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 max-w-lg">
            <form @submit.prevent="saveSettings()" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">OpenRouter API Key</label>
                <div class="text-xs text-gray-400 dark:text-gray-500 mb-1 font-mono" x-text="settings.openrouter_api_key || '—'"></div>
                <input type="text" x-model="settingsForm.openrouter_api_key"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                       placeholder="Новое значение (оставьте пустым для сохранения текущего)">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Telegram Bot Token</label>
                <div class="text-xs text-gray-400 dark:text-gray-500 mb-1 font-mono" x-text="settings.telegram_bot_token || '—'"></div>
                <input type="text" x-model="settingsForm.telegram_bot_token"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                       placeholder="Новое значение (оставьте пустым для сохранения текущего)">
              </div>
              <button type="submit" :disabled="isLoading"
                      class="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white text-sm font-medium rounded-lg transition-colors">
                <span x-show="!isLoading">Сохранить</span>
                <span x-show="isLoading">Сохранение...</span>
              </button>
            </form>
          </div>
        </div>

      </div><!-- /content -->
    </div>
  </template>

  <!-- ─── MODAL: Edit User ─── -->
  <template x-if="showEditUserModal">
    <div class="fixed inset-0 z-40 bg-black/50 flex items-center justify-center p-4" @click.self="showEditUserModal = false">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md p-6 max-h-screen overflow-y-auto">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Изменить пользователя</h3>
        <form @submit.prevent="saveEditUser()" class="space-y-3">
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Telegram ID</label>
            <input type="text" :value="editUserForm.telegram_id" disabled class="w-full px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 text-sm">
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Роль</label>
            <select x-model="editUserForm.role" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none text-sm">
              <option value="agent">agent</option>
              <option value="supervisor">supervisor</option>
              <option value="admin">admin</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Статус</label>
            <select x-model="editUserForm.is_active" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none text-sm">
              <option :value="true">Активен</option>
              <option :value="false">Неактивен</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Телефон (внутренний)</label>
            <input type="text" x-model="editUserForm.phone_internal" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="+79001234567">
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Voice Sample URL</label>
            <input type="text" x-model="editUserForm.voice_sample_url" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="https://...">
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Settings (JSON)</label>
            <textarea x-model="editUserForm.settingsRaw" rows="3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm font-mono" placeholder='{"key": "value"}'></textarea>
          </div>
          <div class="flex gap-2 pt-2">
            <button type="submit" :disabled="isLoading" class="flex-1 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white text-sm font-medium rounded-lg transition-colors">
              <span x-show="!isLoading">Сохранить</span>
              <span x-show="isLoading">Сохранение...</span>
            </button>
            <button type="button" @click="showEditUserModal = false" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg transition-colors">Отмена</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <!-- ─── MODAL: Add Operator ─── -->
  <template x-if="showAddUserModal">
    <div class="fixed inset-0 z-40 bg-black/50 flex items-center justify-center p-4" @click.self="showAddUserModal = false">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md p-6">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Добавить оператора</h3>
        <form @submit.prevent="addUser()" class="space-y-3">
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Telegram ID</label>
            <input type="number" x-model="addUserForm.telegram_id" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="123456789">
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Имя</label>
            <input type="text" x-model="addUserForm.name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Иван Иванов">
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input type="email" x-model="addUserForm.email" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="ivan@example.com">
          </div>
          <div>
            <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">Роль</label>
            <select x-model="addUserForm.role" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white outline-none text-sm">
              <option value="agent">Agent</option>
              <option value="supervisor">Supervisor</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="flex gap-2 pt-2">
            <button type="submit" :disabled="isLoading" class="flex-1 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white text-sm font-medium rounded-lg transition-colors">
              <span x-show="!isLoading">Создать</span>
              <span x-show="isLoading">Создание...</span>
            </button>
            <button type="button" @click="showAddUserModal = false" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg transition-colors">Отмена</button>
          </div>
        </form>
      </div>
    </div>
  </template>


<script>
function adminApp() {
  return {
    token: localStorage.getItem('admin_token'),
    activeTab: 'users',
    isDark: window.matchMedia('(prefers-color-scheme: dark)').matches,
    isLoading: false,
    isLoadingUsers: false,
    botUsername: '',

    // Data
    users: [],
    settings: { openrouter_api_key: '', telegram_bot_token: '' },

    // Modal flags
    showAddUserModal: false,
    showEditUserModal: false,

    // Forms
    loginForm: { telegram_id: '', password: '' },
    addUserForm: { telegram_id: '', name: '', email: '', role: 'agent' },
    editUserForm: { telegram_id: null, role: 'agent', is_active: true, phone_internal: '', voice_sample_url: '', settingsRaw: '{}' },
    settingsForm: { openrouter_api_key: '', telegram_bot_token: '' },

    // Toast list
    toasts: [],

    async init() {
      this.applyTheme();
      await this.loadBotConfig();
      if (this.token) {
        await this.loadTab(this.activeTab);
      }
    },

    async loadBotConfig() {
      try {
        const r = await fetch('/api/admin/public-config');
        if (r.ok) {
          const d = await r.json();
          this.botUsername = d.telegram_bot_username || '';
          if (this.botUsername) this.loadTelegramWidget();
        }
      } catch (_) {}
    },

    loadTelegramWidget() {
      const container = document.getElementById('tg-widget-container');
      if (!container || !this.botUsername) return;
      const script = document.createElement('script');
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-login', this.botUsername);
      script.setAttribute('data-size', 'large');
      script.setAttribute('data-onauth', 'handleTelegramAuth(user)');
      script.setAttribute('data-request-access', 'write');
      script.async = true;
      container.appendChild(script);
    },

    async loginWithTelegram(userData) {
      this.isLoading = true;
      try {
        const r = await fetch('/api/admin/auth/telegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData),
        });
        if (!r.ok) {
          const d = await r.json();
          this.toast(d.detail || 'Ошибка авторизации', 'error');
          return;
        }
        const d = await r.json();
        this.token = d.access_token;
        localStorage.setItem('admin_token', this.token);
        await this.loadTab(this.activeTab);
        this.toast('Добро пожаловать!');
      } catch (e) {
        this.toast('Ошибка сети', 'error');
      } finally {
        this.isLoading = false;
      }
    },

    async login() {
      this.isLoading = true;
      try {
        const r = await fetch('/api/admin/auth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            telegram_id: parseInt(this.loginForm.telegram_id),
            password: this.loginForm.password,
          }),
        });
        if (!r.ok) {
          const d = await r.json();
          this.toast(d.detail || 'Неверные данные', 'error');
          return;
        }
        const d = await r.json();
        this.token = d.access_token;
        localStorage.setItem('admin_token', this.token);
        await this.loadTab(this.activeTab);
        this.toast('Вход выполнен');
      } catch (e) {
        this.toast('Ошибка сети', 'error');
      } finally {
        this.isLoading = false;
      }
    },

    logout() {
      this.token = null;
      localStorage.removeItem('admin_token');
    },

    async api(method, path, body) {
      const opts = {
        method,
        cache: 'no-store',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${this.token}`,
        },
      };
      if (body !== undefined) opts.body = JSON.stringify(body);
      const r = await fetch(path, opts);
      if (r.status === 401) {
        this.logout();
        this.toast('Сессия истекла', 'error');
        return null;
      }
      return r;
    },

    async switchTab(tab) {
      this.activeTab = tab;
      await this.loadTab(tab);
    },

    async loadTab(tab) {
      if (tab === 'users') await this.loadUsers();
      else if (tab === 'settings') await this.loadSettings();
    },

    async loadUsers() {
      this.isLoadingUsers = true;
      try {
        const r = await this.api('GET', '/api/admin/users');
        if (r && r.ok) {
          this.users = await r.json();
        } else if (r) {
          let d = {};
          try { d = await r.json(); } catch (_) {}
          this.toast(d.detail || 'Ошибка загрузки пользователей', 'error');
        }
      } catch (e) {
        this.toast('Ошибка загрузки пользователей', 'error');
      } finally {
        this.isLoadingUsers = false;
      }
    },

    async addUser() {
      this.isLoading = true;
      try {
        const body = {
          ...this.addUserForm,
          telegram_id: parseInt(this.addUserForm.telegram_id),
        };
        const r = await this.api('POST', '/api/admin/users', body);
        if (!r || !r.ok) {
          let d = {};
          try { d = r ? await r.json() : {}; } catch (_) {}
          this.toast(d.detail || 'Ошибка создания', 'error');
          return;
        }
        this.showAddUserModal = false;
        this.addUserForm = { telegram_id: '', name: '', email: '', role: 'agent' };
        await this.loadUsers();
        this.toast('Оператор создан, уведомление отправлено в Telegram');
      } catch (e) {
        this.toast('Ошибка сети', 'error');
      } finally {
        this.isLoading = false;
      }
    },

    openEditModal(u) {
      this.editUserForm = {
        telegram_id: u.telegram_id,
        role: u.role,
        is_active: u.is_active,
        phone_internal: u.phone_internal || '',
        voice_sample_url: u.voice_sample_url || '',
        settingsRaw: Object.keys(u.settings || {}).length ? JSON.stringify(u.settings, null, 2) : '{}',
      };
      this.showEditUserModal = true;
    },

    async saveEditUser() {
      let settings;
      try {
        settings = JSON.parse(this.editUserForm.settingsRaw || '{}');
      } catch (_) {
        this.toast('Неверный JSON в поле Settings', 'error');
        return;
      }
      this.isLoading = true;
      try {
        const body = {
          role: this.editUserForm.role,
          is_active: this.editUserForm.is_active,
          phone_internal: this.editUserForm.phone_internal || null,
          voice_sample_url: this.editUserForm.voice_sample_url || null,
          settings,
        };
        const r = await this.api('PATCH', `/api/admin/users/${this.editUserForm.telegram_id}`, body);
        if (!r || !r.ok) {
          let d = {};
          try { d = r ? await r.json() : {}; } catch (_) {}
          this.toast(d.detail || 'Ошибка обновления', 'error');
          return;
        }
        this.showEditUserModal = false;
        await this.loadUsers();
        this.toast('Пользователь обновлён');
      } catch (e) {
        this.toast('Ошибка сети', 'error');
      } finally {
        this.isLoading = false;
      }
    },

    async deleteUser(telegramId) {
      if (!confirm('Удалить пользователя из базы данных? Это действие необратимо.')) return;
      try {
        const r = await this.api('DELETE', `/api/admin/users/${telegramId}`);
        if (!r || !r.ok) {
          this.toast('Ошибка удаления', 'error');
          return;
        }
        await this.loadUsers();
        this.toast('Пользователь удалён');
      } catch (e) {
        this.toast('Ошибка сети', 'error');
      }
    },

    async loadSettings() {
      try {
        const r = await this.api('GET', '/api/admin/settings');
        if (r && r.ok) this.settings = await r.json();
      } catch (e) {
        this.toast('Ошибка загрузки настроек', 'error');
      }
    },

    async saveSettings() {
      this.isLoading = true;
      try {
        const body = {};
        if (this.settingsForm.openrouter_api_key) body.openrouter_api_key = this.settingsForm.openrouter_api_key;
        if (this.settingsForm.telegram_bot_token) body.telegram_bot_token = this.settingsForm.telegram_bot_token;
        const r = await this.api('PATCH', '/api/admin/settings', body);
        if (!r || !r.ok) {
          let d = {};
          try { d = r ? await r.json() : {}; } catch (_) {}
          this.toast(d.detail || 'Ошибка сохранения', 'error');
          return;
        }
        this.settings = await r.json();
        this.settingsForm = { openrouter_api_key: '', telegram_bot_token: '' };
        this.toast('Настройки сохранены');
      } catch (e) {
        this.toast('Ошибка сети', 'error');
      } finally {
        this.isLoading = false;
      }
    },

    toast(msg, type = 'success') {
      const id = Date.now();
      this.toasts.push({ id, msg, type });
      setTimeout(() => {
        this.toasts = this.toasts.filter(t => t.id !== id);
      }, 4000);
    },

    tabLabel(tab) {
      return { users: 'Пользователи', settings: 'Настройки' }[tab] || tab;
    },

    toggleTheme() {
      this.isDark = !this.isDark;
      this.applyTheme();
    },

    applyTheme() {
      document.documentElement.classList.toggle('dark', this.isDark);
    },
  };
}

// Called by Telegram Login Widget
window.handleTelegramAuth = function(user) {
  Alpine.store && Alpine.store('app') && Alpine.store('app').loginWithTelegram(user);
  // Fallback: find component and call method
  document.querySelectorAll('[x-data]').forEach(el => {
    if (el._x_dataStack) {
      const data = el._x_dataStack[0];
      if (data && typeof data.loginWithTelegram === 'function') {
        data.loginWithTelegram(user);
      }
    }
  });
};
</script>
</body>
