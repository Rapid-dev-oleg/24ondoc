services:
  # --- Reverse Proxy (nginx) ---
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      pgadmin:
        condition: service_healthy
      twenty:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  # --- SSL Certificate Manager ---
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # --- Backend (Python FastAPI) ---
  backend:
    build:
      context: ./backend
      target: runtime
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}
      - TELEGRAM_WEBHOOK_BASE_URL=${TELEGRAM_WEBHOOK_BASE_URL:-https://24ondoc.ru}
      - T2_WEBHOOK_SECRET=${T2_WEBHOOK_SECRET}
      - TWENTY_API_KEY=${TWENTY_API_KEY:-}
      - TWENTY_BASE_URL=${TWENTY_BASE_URL:-https://24ondoc.ru}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WHISPER_BASE_URL=${WHISPER_BASE_URL:-http://whisper:9000}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - ATS2_BASE_URL=${ATS2_BASE_URL:-https://ats2.t2.ru/crm/openapi}
      - ATS2_ACCESS_TOKEN=${ATS2_ACCESS_TOKEN:-}
      - ATS2_REFRESH_TOKEN=${ATS2_REFRESH_TOKEN:-}
      - ATS2_POLL_INTERVAL_SEC=${ATS2_POLL_INTERVAL_SEC:-60}
      - ATS2_ENABLED=${ATS2_ENABLED:-false}
      - ATS2_PROXY_URL=${ATS2_PROXY_URL:-}
    volumes:
      - voice_samples:/app/data/voices
      - task_attachments:/app/data/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # --- Whisper STT (self-hosted, optional) ---
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=faster_whisper
    volumes:
      - whisper_cache:/root/.cache/whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/docs"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    profiles:
      - whisper
    networks:
      - backend

  # --- PostgreSQL 15 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # --- MinIO (Object Storage) ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - backend

  # --- pgAdmin 4 (Web UI for PostgreSQL) ---
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_CONFIG_SCRIPT_NAME='/pgadmin'
      - PGADMIN_DB_USER=${POSTGRES_USER}
      - PGADMIN_DB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    entrypoint: >
      /bin/sh -c "
      echo \"postgres:5432:*:$${PGADMIN_DB_USER}:$${PGADMIN_DB_PASSWORD}\" > /tmp/pgpass &&
      chmod 600 /tmp/pgpass &&
      export PGPASSFILE=/tmp/pgpass &&
      /entrypoint.sh
      "
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # --- Twenty CRM (24ondoc.ru/) ---
  twenty:
    image: twentycrm/twenty:latest
    environment:
      - SERVER_URL=${TWENTY_SERVER_URL:-https://24ondoc.ru}
      - FRONT_BASE_URL=${TWENTY_FRONT_BASE_URL:-https://24ondoc.ru}
      - PG_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/twenty_db
      - APP_SECRET=${TWENTY_APP_SECRET}
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=.local-storage
      - IS_SIGN_UP_DISABLED=${TWENTY_SIGN_UP_DISABLED:-false}
      - REDIS_URL=redis://redis:6379/2
      - CACHE_STORAGE_TYPE=redis
    volumes:
      - twenty_data:/app/.local-storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # --- PostgreSQL Backup (daily) ---
  pg-backup:
    image: prodrigestivill/postgres-backup-local:15
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB},twenty_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - pg_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  voice_samples:
  whisper_cache:
  minio_data:
  certbot_webroot:
  pg_backups:
  pgadmin_data:
  task_attachments:
  twenty_data:

networks:
  frontend:
  backend:
